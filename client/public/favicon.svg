<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Circular background -->
  <circle cx="32" cy="32" r="32" fill="white"/>

  <!-- Shield shape -->
  <path d="M8 22 L32 16 L56 22 L56 46 L32 54 L8 46 Z" fill="white" stroke="#1a2332" stroke-width="2"/>

  <!-- Rocky ground -->
  <path d="M14 38 Q20 35 26 37 Q32 34 38 36 Q44 34 50 38 L52 42 L32 48 L12 42 Z" fill="#6b7b8d"/>

  <!-- Pine trees left -->
  <g fill="#2d5a3d">
    <path d="M18 37 L16 30 L14 37 Z"/>
    <path d="M18 32 L16 26 L14 32 Z"/>
    <path d="M23 36 L21 29 L19 36 Z"/>
    <path d="M23 31 L21 25 L19 31 Z"/>
  </g>

  <!-- Pine trees right -->
  <g fill="#2d5a3d">
    <path d="M45 36 L43 29 L41 36 Z"/>
    <path d="M45 31 L43 25 L41 31 Z"/>
    <path d="M50 37 L48 31 L46 37 Z"/>
  </g>

  <!-- Lighthouse body -->
  <path d="M29 37 L28 22 L36 22 L35 37 Z" fill="#d4dae0" stroke="#1a2332" stroke-width="1"/>

  <!-- Gallery -->
  <rect x="26" y="20" width="12" height="2.5" fill="#1a2332" rx="0.5"/>

  <!-- Lantern room -->
  <path d="M28 20 L29 15 L35 15 L36 20 Z" fill="#8faabe" stroke="#1a2332" stroke-width="1"/>
  <line x1="31" y1="15.5" x2="31" y2="19.5" stroke="#1a2332" stroke-width="0.8"/>
  <line x1="33" y1="15.5" x2="33" y2="19.5" stroke="#1a2332" stroke-width="0.8"/>

  <!-- Dome -->
  <path d="M30 15 Q32 11 34 15 Z" fill="#1a2332"/>
  <!-- Spire -->
  <line x1="32" y1="11" x2="32" y2="8" stroke="#1a2332" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Text -->
  <text x="32" y="45.5" text-anchor="middle" font-family="'Georgia', serif" font-weight="bold" font-size="5.5" fill="#1a2332" letter-spacing="0.5">THE MAINE</text>
  <text x="32" y="50" text-anchor="middle" font-family="'Georgia', serif" font-weight="bold" font-size="4" fill="#1a2332" letter-spacing="0.8">CLEANING CO.</text>
</svg>
